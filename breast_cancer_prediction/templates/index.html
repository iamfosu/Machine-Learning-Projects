<!DOCTYPE html>
<html>
<head>
    <title>Breast Cancer Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="banner">
    <img src="{{ url_for('static', filename='images/banner.jpg') }}" alt="Banner">
    </div>    

<div class="container">

    <h2>Breast Cancer Prediction</h2>

    <p>Enter 31 feature values (comma or space separated)</p>

    <form action="/predict" method="post" autocomplete="off">

        <textarea 
        name="features" 
        placeholder="Example: 17.99,10.38,122.8,...">
        </textarea>

        <br>

        <button type="submit">Predict</button>
        <button type="button" onclick="fillSample()">Use Sample</button>

    </form>

    <h3 id="result">{{ prediction_text }}</h3>

    {% if image_file %}
    <div class="result-image">
        <img src="{{ url_for('static', filename='images/' + image_file) }}" alt="Result Image">
    </div>
    {% endif %}
    

</div>

<script>
// Fill sample data
function fillSample() {
    document.querySelector("textarea").value =
    "17.99,10.38,122.8,1001,0.1184,0.2776,0.3001,0.1471,0.2419,0.07871,1.095,0.9053,8.589,153.4,0.006399,0.04904,0.05373,0.01587,0.03003,0.006193,25.38,17.33,184.6,2019,0.1622,0.6656,0.7119,0.2654,0.4601,0.1189";
    
    // Clear previous result
    document.getElementById("result").innerText = "";
}

// Show loading text when predicting
document.querySelector("form").addEventListener("submit", function() {
    document.getElementById("result").innerText = "Processing...";
});
</script>
</body>
</html>
